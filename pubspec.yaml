name: libsk
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  firebase_storage: ^13.0.2
  url_launcher: ^6.2.5
  firebase_messaging: ^16.1.3
  permission_handler: ^11.3.1
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cloud_functions: ^6.1.0
  flutter_stripe: ^10.1.1
  google_sign_in: ^6.2.1
  shared_preferences: ^2.3.3
  http: ^1.6.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_jailbreak_detection: ^1.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/launcher_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFDF8"
  adaptive_icon_foreground: "assets/launcher_icon.png"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/libsk_logo.png
    - assets/launcher_icon.png

  fonts:
    - family: CormorantGaramond
      fonts:
        - asset: assets/fonts/CormorantGaramond-VariableFont_wght.ttf
        - asset: assets/fonts/CormorantGaramond-Italic-VariableFont_wght.ttf
          style: italic

    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-VariableFont_opsz,wght.ttf
        - asset: assets/fonts/DMSans-Italic-VariableFont_opsz,wght.ttf
          style: italic